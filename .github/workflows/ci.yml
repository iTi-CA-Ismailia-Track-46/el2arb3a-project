name: CI

on:
  push:
    branches: [main]
    paths: ["app/**"]
  pull_request:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

env:
  IMAGE_NAME: svelte-app
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: bun run lint

      - name: Run type checking
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Build project
        run: bun run build

      - name: Build Docker Image
        run: docker build -t ${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 0 # Don't fail the build on vulnerabilities, but log them
          severity: CRITICAL,HIGH

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image to Amazon ECR
        run: docker push ${{ vars.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
